<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Besos con flores</title>
    <style>
        body {
            background-color: #ffe6f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-size: 40px;
        }

        .item {
            position: absolute;
            animation: caer 3s linear infinite;
        }

        @keyframes caer {
            0% {
                transform: translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<script>
    function crearElemento() {
        const elemento = document.createElement("div");
        elemento.classList.add("item");

        const emojis = ["😘", "🌸"];
        elemento.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        elemento.style.left = Math.random() * window.innerWidth + "px";

        document.body.appendChild(elemento);

        setTimeout(() => {
            elemento.remove();
        }, 3000);
    }

    setInterval(crearElemento, 300);
</script>

</body>
</html>
